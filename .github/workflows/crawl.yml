name: Crawl & Mirror Site

on:
  workflow_dispatch:           # Manual trigger from Actions tab

permissions:
  contents: write

jobs:
  crawl:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: pip install requests beautifulsoup4 tqdm

      - name: Run mirror
        run: python3 scripts/mirror.py --delay 0.5 --verbose

      - name: Commit mirrored content
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add -A
          # Only commit if there are changes
          git diff --cached --quiet || git commit -m "chore: update mirror $(date -u +%Y-%m-%d) [skip ci]"
          git push
